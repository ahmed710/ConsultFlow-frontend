<div class="authentication-basic-background">
  <img src="./assets/images/media/backgrounds/9.png" alt="">
</div>
<div class="container">
  <div class="row justify-content-center align-items-center authentication authentication-basic h-100">
    <div class="col-xxl-4 col-xl-5 col-lg-6 col-md-6 col-sm-8 col-12">
      <div class="card custom-card border-0 my-4">
        <div class="card-body p-5">
          <div class="mb-4">
            <a [routerLink]="['/dashboards/sales']">
              <img src="./assets/images/brand-logos/toggle-logo.png" alt="logo" class="desktop-dark">
            </a>
          </div>
          <div>
            <h4 class="mb-1 fw-semibold">Sign Up</h4>
            <p class="mb-4 text-muted fw-normal">Join us by creating a free account !</p>
          </div>
          <div class="row gy-3">
            <div class="col-xl-12">
              <label for="signin-email" class="form-label text-default">Email</label>
              <input type="text" class="form-control"  name="email" id="signin-email" placeholder="Enter Email"
                     [(ngModel)]="email">
            </div>
            <div class="col-xl-12 mb-2">
              <label for="signin-password" class="form-label text-default d-block">Password</label>
              <div class="position-relative">
                <input class="form-control"  name="password" [type]="showPassword ? 'text' : 'password'" autocomplete
                       id="signin-password" placeholder="Enter Password" [(ngModel)]="password" type="password">
                <a class="show-password-button text-muted" href="javascript:void(0);" id="button-addon2"
                   (click)="createpassword()"><i class="ri-eye-{{toggleClass}} align-middle"></i></a>
              </div>
            </div>
            <div class="col-xl-12">
              <label class="form-label text-default">Role</label>
              <select class="form-control" name="role" [(ngModel)]="role">
                <option value="User">User</option>
                <option value="Admin">Admin</option>
              </select>
            </div>
          </div>
          <div class="d-grid mt-3">
            <button (click)="register()" class="btn btn-primary">Sign Up</button>
          </div>
          <div class="text-center mt-3 fw-medium">
            Already have a account? <a [routerLink]="['/auth/login']" class="text-primary">Sign In</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
